<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iván Rodríguez Moraleda - Curriculum Vitae</title>
    <!-- Traemos la fuente Inter para mantener el diseño -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
	body {
    	    animation: entradaCV 0.6s cubic-bezier(0.76, 0, 0.24, 1) forwards;
	}

	@keyframes entradaCV {
            from {
                opacity: 0;
                transform: translateY(60px);
    	    }
    	    to {
                opacity: 1;
                transform: translateY(0);
    	    }
	}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f4;
            overflow: hidden;
        }
        /* Barra superior de navegación */
        .cv-header {
            width: 100%;
            height: 60px;
            background-color: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            padding: 0 20px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 100;
        }
        .btn-back {
            text-decoration: none;
            color: #111;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }
        .btn-back:hover {
            opacity: 0.6;
        }
        /* Contenedor del PDF a pantalla completa */
        .pdf-container {
            width: 100%;
            height: calc(100% - 60px);
            margin-top: 60px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Barra de herramientas superior -->
    <header class="cv-header">
        <a href="index.html" class="btn-back">← Volver al Portafolio</a>
    </header>

    <!-- Visor de PDF incorporado -->
    <main class="pdf-container">
        <iframe src="cvivan.pdf" type="application/pdf"></iframe>
    </main>

</body>
</html>
